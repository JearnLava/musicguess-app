<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://musicguess.net; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://github.com https://objects.githubusercontent.com;">
  <title>MusicGuess</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    #titlebar {
      height: 42px;
      min-height: 42px;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 14px;
      -webkit-app-region: drag;
      border-bottom: 1px solid rgba(255, 77, 77, 0.15);
      position: relative;
      z-index: 100;
      user-select: none;
    }

    .tb-left {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .tb-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #FF4D4D;
      filter: drop-shadow(0 0 6px rgba(255, 77, 77, 0.4));
    }

    .tb-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #FF4D4D 0%, #00E5FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tb-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qa-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tb-qa-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #ccc;
      cursor: grab;
      transition: all 0.2s ease;
    }

    .tb-qa-btn:hover {
      background: rgba(0, 229, 255, 0.08);
      border-color: rgba(0, 229, 255, 0.3);
      color: #00E5FF;
    }

    .tb-qa-btn:active {
      cursor: grabbing;
    }

    .tb-qa-btn.dragging {
      opacity: 0.4;
      border: 1px dashed #FF4D4D;
    }

    .tb-qa-btn.ingame {
      background: rgba(0, 229, 255, 0.15);
      border-color: #00E5FF;
      color: #00E5FF;
      animation: pulse-cyan 2s infinite;
    }

    @keyframes pulse-cyan {
      0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(0, 229, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
    }

    #update-pill {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 11.5px;
      color: #FF4D4D;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #update-pill.show { display: flex; }
    #update-pill:hover { background: rgba(255, 77, 77, 0.18); }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #FF4D4D;
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 2px;
      -webkit-app-region: no-drag;
    }

    .tb-sep {
      width: 1px;
      height: 14px;
      background: rgba(255,255,255,0.07);
      margin: 0 4px;
    }

    .tb-btn {
      width: 34px;
      height: 28px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #505050;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      -webkit-app-region: no-drag;
    }

    .tb-btn:hover          { background: rgba(255,255,255,0.06); color: #999; }
    .tb-btn.settings:hover { background: rgba(255,77,77,0.15); color: #FF4D4D; }
    .tb-btn.win-close:hover { background: rgba(239,68,68,0.18); color: #f87171; }

    #webview-container {
      flex: 1;
      width: 100%;
      position: relative;
      background: #0f0f23;
    }

    webview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    #dl-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, #FF4D4D, #00E5FF);
      transition: width 0.4s ease;
      display: none;
    }

    #dl-bar.show { display: block; }
  </style>
</head>
<body>

<div id="titlebar">
  <div class="tb-left">
    <div class="tb-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
        <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1" opacity="0.5"/>
      </svg>
    </div>
    <span class="tb-title">MusicGuess</span>
  </div>

  <div class="tb-center">
    <div class="qa-container" id="qa-container"></div>

    <div id="update-pill" onclick="handlePillClick()">
      <div class="pill-dot"></div>
      <span id="pill-text">Update Available</span>
    </div>
  </div>

  <div class="tb-right">
    <button class="tb-btn settings" onclick="window.api.openSettings()" title="Settings">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
        <circle cx="7.5" cy="7.5" r="2"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M2.9 2.9l1.1 1.1M11 11l1.1 1.1M11 4l1.1-1.1M2.9 12.1L4 11"/>
      </svg>
    </button>

    <div class="tb-sep"></div>

    <button class="tb-btn" onclick="window.api.minimize()" title="Minimize">
      <svg width="12" height="2" viewBox="0 0 12 2" fill="currentColor">
        <rect width="12" height="1.5" rx="0.75"/>
      </svg>
    </button>

    <button class="tb-btn" onclick="window.api.maximize()" title="Maximize">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.3">
        <rect x="0.65" y="0.65" width="9.7" height="9.7" rx="1.5"/>
      </svg>
    </button>

    <button class="tb-btn win-close" onclick="window.api.close()" title="Close">
      <svg width="11" height="11" viewBox="0 0 11 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="1" y1="1" x2="10" y2="10"/>
        <line x1="10" y1="1" x2="1" y2="10"/>
      </svg>
    </button>
  </div>

  <div id="dl-bar"></div>
</div>

<div id="webview-container">
  <webview id="game" src="https://musicguess.net" allowpopups></webview>
</div>

<script>
  let updateDownloaded = false;
  let pill, pillText, dlBar, qaContainer;
  let webview;
  let appSettings = {};
  let currentRoomCode = null;
  let tokenPollInterval = null;
  let hasValidToken = false;

  const FIXED_ACTIONS = [
    { label: 'Home', action: 'home' },
    { label: 'Create Public', action: 'create-public' },
    { label: 'Create Private', action: 'create-private' },
    { label: 'Play Solo', action: 'play-solo' }
  ];

  function updateWebviewZoom() {
    if (!webview || webview.isLoading()) return;
    const baseWidth = 1280;
    const currentWidth = window.innerWidth;
    const zoomFactor = currentWidth / baseWidth;
    webview.executeJavaScript(`document.body.style.zoom = '${zoomFactor}';`).catch(() => {});
  }

  function executeActionInWebview(actionType) {
    if (!webview) return;

    if (actionType === 'home') {
      webview.src = "https://musicguess.net";
      return;
    }

    webview.src = "https://musicguess.net";

    const triggerScript = () => {
      setTimeout(() => {
        if (actionType === 'create-public') {
          webview.executeJavaScript(`
            (function() {
              var publicStartBtn = document.querySelector('.home-secondary-btn');
              if (publicStartBtn) {
                publicStartBtn.click();
                
                setTimeout(() => {
                  var publicHeroBtn = document.querySelector('.btn.btn-hero, .btn-hero');
                  if (publicHeroBtn) publicHeroBtn.click();
                }, 300);
              }
            })();
          `).catch(() => {});
        } 
        
        else if (actionType === 'create-private') {
          webview.executeJavaScript(`
            (function() {
              var privateBtn = document.querySelector('.home-card.home-card-create, .home-card-create');
              if (privateBtn) privateBtn.click();
            })();
          `).catch(() => {});
        } 
        
        else if (actionType === 'play-solo') {
          webview.executeJavaScript(`
            (function() {
              var btns = Array.from(document.querySelectorAll('button'));
              var target = btns.find(b => b.textContent.toLowerCase().includes('solo'));
              if (target) target.click();
            })();
          `).catch(() => {});
        }
      }, 1500);
      
      webview.removeEventListener('did-stop-loading', triggerScript);
    };

    webview.addEventListener('did-stop-loading', triggerScript);
  }

  async function loadAndRenderQuickActions() {
    try {
      appSettings = await window.api.getSettings();
    } catch(e) {
      appSettings = {};
    }
    
    if (!appSettings || !appSettings.quickActions || appSettings.quickActions.length !== FIXED_ACTIONS.length) {
      appSettings = appSettings || {};
      appSettings.quickActions = [...FIXED_ACTIONS];
    }
    
    qaContainer.innerHTML = '';
    appSettings.quickActions.forEach((action) => {
      const btn = document.createElement('button');
      btn.className = 'tb-qa-btn';
      btn.textContent = action.label;
      btn.draggable = true;
      btn.setAttribute('data-action', action.action);
      
      if (currentRoomCode && action.action !== 'home') {
        btn.classList.add('ingame');
      }

      btn.onclick = () => {
        executeActionInWebview(action.action);
      };

      btn.addEventListener('dragstart', () => btn.classList.add('dragging'));
      btn.addEventListener('dragend', () => btn.classList.remove('dragging'));

      qaContainer.appendChild(btn);
    });

    initDragAndDrop();
  }

  function initDragAndDrop() {
    qaContainer.addEventListener('dragover', e => {
      e.preventDefault();
      const afterElement = getDragAfterElement(qaContainer, e.clientX);
      const dragging = document.querySelector('.dragging');
      if (dragging == null) return;
      if (afterElement == null) {
        qaContainer.appendChild(dragging);
      } else {
        qaContainer.insertBefore(dragging, afterElement);
      }
    });

    qaContainer.addEventListener('drop', async () => {
      const currentButtons = Array.from(qaContainer.querySelectorAll('.tb-qa-btn'));
      const newOrder = currentButtons.map(btn => {
        return {
          label: btn.textContent,
          action: btn.getAttribute('data-action')
        };
      });
      appSettings.quickActions = newOrder;
      await window.api.saveSettings(appSettings);
    });
  }

  function getDragAfterElement(container, x) {
    const draggableElements = [...container.querySelectorAll('.tb-qa-btn:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = x - box.left - box.width / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      } else {
        return closest;
      }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  document.addEventListener('DOMContentLoaded', () => {
    pill = document.getElementById('update-pill');
    pillText = document.getElementById('pill-text');
    dlBar = document.getElementById('dl-bar');
    qaContainer = document.getElementById('qa-container');
    webview = document.getElementById('game');

    loadAndRenderQuickActions();

    window.api.onUpdateStatus((d) => {
      if (!pill || !pillText || !dlBar) return;
      if (d.type === 'checking') {
        pillText.textContent = 'Checking updates...';
        pill.classList.add('show');
      } else if (d.type === 'available') {
        pillText.textContent = `Downloading v${d.version}…`;
        pill.classList.add('show');
        dlBar.classList.add('show');
      } else if (d.type === 'progress') {
        dlBar.style.width = d.percent + '%';
        pillText.textContent = `Downloading… ${d.percent}%`;
      } else if (d.type === 'downloaded') {
        updateDownloaded = true;
        dlBar.classList.remove('show');
        pillText.textContent = '↺ Install & Restart';
        pill.classList.add('show');
      } else if (d.type === 'none') {
        setTimeout(() => { if (!updateDownloaded && pill) pill.classList.remove('show'); }, 1500);
      } else if (d.type === 'error') {
        pillText.textContent = 'Update Error!';
        setTimeout(() => { if (!updateDownloaded && pill) pill.classList.remove('show'); }, 3000);
      }
    });

    window.api.onMatchStatus((room) => {
      if (room && room.code) {
        currentRoomCode = room.code;
      } else {
        currentRoomCode = null;
      }
      loadAndRenderQuickActions();
    });

    webview.addEventListener('dom-ready', () => {
      startTokenPolling();
      updateWebviewZoom();
    });

    window.addEventListener('resize', updateWebviewZoom);
  });

  function handlePillClick() {
    if (updateDownloaded) window.api.installUpdate();
  }

  function startTokenPolling() {
    if (tokenPollInterval) clearInterval(tokenPollInterval);
    
    const checkToken = async () => {
      if (!webview || webview.isLoading()) return;
      try {
        const token = await webview.executeJavaScript("localStorage.getItem('mg_session_token');");
        if (token) {
          window.api.sendToken(token);
          if (!hasValidToken) {
            hasValidToken = true;
            clearInterval(tokenPollInterval);
            tokenPollInterval = setInterval(checkToken, 30000); // Auf 30 Sek drosseln, sobald Token da ist
          }
        }
      } catch (e) {}
    };

    tokenPollInterval = setInterval(checkToken, 7000); // 7 Sekunden initial
  }
</script>
</body>
</html>
