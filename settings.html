<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #13131f;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #s-bar {
      height: 42px;
      background: #0f0f1a;
      border-bottom: 1px solid rgba(139,92,246,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 16px;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }

    .s-bar-title {
      font-size: 12.5px;
      font-weight: 600;
      color: #a78bfa;
      -webkit-app-region: drag;
    }

    .s-close-btn {
      width: 28px;
      height: 26px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #6b7280;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      -webkit-app-region: no-drag;
    }

    .s-close-btn:hover { background: rgba(239,68,68,0.18); color: #f87171; }

    .content {
      flex: 1;
      padding: 24px 22px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .version-box {
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .v-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .v-info { display: flex; flex-direction: column; gap: 2px; }
    .v-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
    .v-num  { font-size: 12px; color: #7c7c9a; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #7c7c9a;
      margin-bottom: -8px;
    }

    .setting-row {
      background: #1c1c2e;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .setting-info { display: flex; flex-direction: column; gap: 3px; }

    .setting-label {
      font-size: 13.5px;
      font-weight: 500;
      color: #d1d5db;
    }

    .setting-desc {
      font-size: 11.5px;
      color: #6b7280;
      line-height: 1.5;
    }

    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #2d2d45;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #6b7280;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
      pointer-events: none;
    }

    .toggle input:checked + .toggle-track { background: #7c3aed; border-color: #7c3aed; }
    .toggle input:checked + .toggle-track + .toggle-thumb {
      transform: translateX(18px);
      background: #fff;
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }

    .btn {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      border: none;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: #9ca3af;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.09); color: #d1d5db; }

    #update-info {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      min-height: 16px;
      transition: color 0.2s;
    }

    #update-info.success { color: #34d399; }
    #update-info.error   { color: #f87171; }
    #update-info.info    { color: #a78bfa; }
  </style>
</head>
<body>

<div id="s-bar">
  <span class="s-bar-title">Settings</span>
  <button class="s-close-btn" onclick="window.api.closeSettings()">
    <svg width="10" height="10" viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="1" y1="1" x2="9" y2="9"/>
      <line x1="9" y1="1" x2="1" y2="9"/>
    </svg>
  </button>
</div>

<div class="content">

  <div class="version-box">
    <div class="v-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 13V8C3 5.2 5.2 3 8 3C10.8 3 13 5.2 13 8V12" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="13.5" cy="13" r="2" stroke="white" stroke-width="1.4"/>
        <circle cx="3.5"  cy="13.5" r="2" stroke="white" stroke-width="1.4"/>
        <line x1="13" y1="7" x2="17" y2="6" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="v-info">
      <span class="v-name">MusicGuess</span>
      <span class="v-num" id="version-text">Version loading…</span>
    </div>
  </div>

  <span class="section-title">Updates</span>

  <div class="setting-row">
    <div class="setting-info">
      <span class="setting-label">Auto-Update</span>
      <span class="setting-desc">Check for new versions automatically on startup</span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="auto-update-toggle" onchange="onToggle()">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <div id="update-info"></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="check-btn" onclick="checkNow()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round">
        <path d="M12 7A5 5 0 1 1 7 2"/>
        <polyline points="10 2 12 2 12 4"/>
      </svg>
      Check for updates
    </button>
    <button class="btn btn-secondary" onclick="window.api.closeSettings()">Close</button>
  </div>

</div>

<script>
  const toggle   = document.getElementById('auto-update-toggle')
  const info     = document.getElementById('update-info')
  const checkBtn = document.getElementById('check-btn')

  ;(async () => {
    const [version, settings] = await Promise.all([
      window.api.getVersion(),
      window.api.getSettings(),
    ])
    document.getElementById('version-text').textContent = `Version ${version}`
    toggle.checked = settings.autoUpdate
  })()

  async function onToggle() {
    const settings = await window.api.getSettings()
    settings.autoUpdate = toggle.checked
    await window.api.saveSettings(settings)
  }

  async function checkNow() {
    checkBtn.disabled = true
    setInfo('Checking for updates…', 'info')

    const result = await window.api.checkUpdate()

    if (!result.success) {
      setInfo('Error: ' + result.error, 'error')
      checkBtn.disabled = false
    }
  }

  window.api.onUpdateStatus((d) => {
    checkBtn.disabled = false
    if (d.type === 'none')      setInfo('You have the latest version ✓', 'success')
    else if (d.type === 'available') setInfo(`v${d.version} will be downloaded…`, 'info')
    else if (d.type === 'downloaded') setInfo('Update ready – Restart the app!', 'success')
    else if (d.type === 'error') setInfo('Update error: ' + d.message, 'error')
  })

  function setInfo(msg, type) {
    info.textContent = msg
    info.className   = type || ''
  }
</script>
</body>
</html>
